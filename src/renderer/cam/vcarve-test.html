<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MassoCAM — V-Carve Spine Harness</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #111; color: #ccc; font: 13px/1.4 'Consolas','Courier New',monospace; }

#app { display: flex; height: 100vh; overflow: hidden; }

#controls {
  width: 240px; min-width: 240px; background: #1a1a1a;
  border-right: 1px solid #333; padding: 10px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 6px;
}
#controls h2 { color: #fff; font-size: 13px; margin-bottom: 4px; letter-spacing: 0.5px; }

.field { display: flex; flex-direction: column; gap: 2px; }
.field label { color: #888; font-size: 11px; }
.field input, .field select {
  background: #222; border: 1px solid #444; color: #eee;
  padding: 4px 6px; border-radius: 3px; font: inherit; width: 100%;
}
.field input:focus, .field select:focus { outline: none; border-color: #0af; }

hr { border: none; border-top: 1px solid #2a2a2a; margin: 2px 0; }

#runBtn {
  margin-top: 4px; padding: 7px; background: #005a9e;
  border: none; border-radius: 3px; color: #fff; font: inherit;
  cursor: pointer; letter-spacing: 0.5px; font-size: 13px;
}
#runBtn:hover { background: #0074cc; }
#runBtn:active { background: #004a80; }

#status {
  font-size: 11px; color: #666; padding-top: 6px;
  border-top: 1px solid #2a2a2a; white-space: pre-wrap; line-height: 1.6;
}

#legend { font-size: 11px; color: #888; }
#legendBar { display: block; width: 100%; height: 12px; border-radius: 2px; margin: 4px 0 2px; }
#legendLabels { display: flex; justify-content: space-between; font-size: 10px; color: #555; }

#canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #1a1a1a; }
#canvas { display: block; }

#gcode-panel {
  width: 300px; min-width: 300px; background: #1a1a1a;
  border-left: 1px solid #333; display: flex; flex-direction: column;
}
#gcode-header {
  padding: 8px 10px; background: #222; border-bottom: 1px solid #333;
  display: flex; justify-content: space-between; align-items: center;
}
#gcode-header span { color: #fff; font-size: 12px; }
#copyBtn {
  padding: 3px 8px; background: #333; border: 1px solid #555;
  border-radius: 3px; color: #ccc; font: 11px/1 inherit; cursor: pointer;
}
#copyBtn:hover { background: #444; }
#gcode {
  flex: 1; background: #0e0e0e; color: #4cf; font: 11px/1.5 'Consolas','Courier New',monospace;
  border: none; resize: none; padding: 8px; overflow-y: auto;
  white-space: pre; outline: none;
}
</style>
</head>
<body>

<script src="../../../node_modules/clipper-lib/clipper.js"></script>

<div id="app">
  <!-- ── Controls ───────────────────────────────────────────── -->
  <div id="controls">
    <h2>V-Carve Spine Harness</h2>

    <div class="field">
      <label>Shape</label>
      <select id="shapeSelect">
        <option value="synthetic">Synthetic 'a' (control)</option>
        <option value="realistic">Realistic 'a' (production)</option>
      </select>
    </div>

    <hr>
    <div class="field">
      <label>Spine step (mm)</label>
      <input id="depthStep" type="number" value="0.05" step="0.01" min="0.01" max="0.5">
    </div>
    <div class="field">
      <label>Bit half-angle (°)</label>
      <input id="bitAngle" type="number" value="45" step="1" min="10" max="80">
    </div>
    <div class="field">
      <label>Safe Z (mm)</label>
      <input id="safeZ" type="number" value="5.0" step="0.5" min="0.5" max="25">
    </div>

    <hr>
    <div class="field">
      <label>Spindle (RPM)</label>
      <input id="spindleRPM" type="number" value="18000" step="1000" min="1000" max="30000">
    </div>
    <div class="field">
      <label>Cut feed (mm/min)</label>
      <input id="feedRate" type="number" value="1498.6" step="10" min="50" max="6000">
    </div>
    <div class="field">
      <label>Plunge feed (mm/min)</label>
      <input id="plungeRate" type="number" value="304.8" step="5" min="10" max="2000">
    </div>

    <button id="runBtn">&#9654; Run</button>

    <div id="legend">
      Depth colour scale:
      <canvas id="legendBar"></canvas>
      <div id="legendLabels"><span>Shallow</span><span>Deep</span></div>
    </div>

    <div id="status">Ready.</div>
  </div>

  <!-- ── Canvas ─────────────────────────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <!-- ── G-code output ──────────────────────────────────────── -->
  <div id="gcode-panel">
    <div id="gcode-header">
      <span>G-Code Output</span>
      <button id="copyBtn">Copy</button>
    </div>
    <textarea id="gcode" readonly spellcheck="false"></textarea>
  </div>
</div>

<script>
'use strict';

// ── Clipper geometry helpers ──────────────────────────────────────────────────

const SCALE = 1000;
function toC(pts) { return pts.map(p => ({ X: Math.round(p.x * SCALE), Y: Math.round(p.y * SCALE) })); }
function fromC(path) { return path.map(p => ({ x: p.X / SCALE, y: p.Y / SCALE })); }

function stripClose(pts) {
  if (pts.length > 1 && Math.hypot(pts[pts.length-1].x - pts[0].x, pts[pts.length-1].y - pts[0].y) < 1e-6)
    return pts.slice(0, -1);
  return pts;
}
function isClockwise(pts) {
  let sum = 0, n = pts.length;
  for (let i = 0; i < n - 1; i++) sum += (pts[i+1].x - pts[i].x) * (pts[i+1].y + pts[i].y);
  return sum > 0;
}
function polygonArea(pts) {
  let a = 0, n = pts.length;
  for (let i = 0, j = n - 1; i < n; j = i++) a += (pts[j].x + pts[i].x) * (pts[j].y - pts[i].y);
  return Math.abs(a / 2);
}
function clipperOffset(pts, distance) {
  const co = new ClipperLib.ClipperOffset();
  co.AddPath(toC(pts), ClipperLib.JoinType.jtMiter, ClipperLib.EndType.etClosedPolygon);
  const sol = new ClipperLib.Paths();
  co.Execute(sol, -distance * SCALE);
  return sol.map(fromC).filter(p => p.length >= 3)
    .map(p => isClockwise(p) ? [...p].reverse() : p)
    .sort((a, b) => polygonArea(b) - polygonArea(a));
}
function offsetPolyline(pts, d) {
  const p = stripClose([...pts]);
  if (p.length < 3) return [p];
  const r = clipperOffset(p, d);
  if (!r.length) return [[]];
  return r.map(q => [...q, { ...q[0] }]);
}
// Returns only outer contours from subject MINUS clipList via PolyTree.
function differenceOuterOnly(subj, clipList) {
  const s = stripClose([...subj]);
  if (s.length < 3) return [];
  const c = new ClipperLib.Clipper();
  c.AddPath(toC(s), ClipperLib.PolyType.ptSubject, true);
  for (const cl of clipList) {
    const p = stripClose([...cl]);
    if (p.length >= 3) c.AddPath(toC(p), ClipperLib.PolyType.ptClip, true);
  }
  const polyTree = new ClipperLib.PolyTree();
  c.Execute(ClipperLib.ClipType.ctDifference, polyTree);
  return polyTree.m_Childs
    .map(node => fromC(node.m_polygon))
    .filter(p => p.length >= 3)
    .map(p => isClockwise(p) ? [...p].reverse() : p);
}

// ── V-Carve spine pipeline ────────────────────────────────────────────────────

function dist2(a, b) { return (a.x - b.x) ** 2 + (a.y - b.y) ** 2; }

function computeValidPaths(outer, holes, R) {
  const so = offsetPolyline(outer, R);
  if (!so?.length) return [];
  const vo = so.filter(r => r?.length >= 3);
  if (!vo.length) return [];
  if (!holes?.length) return vo;
  const eh = holes.flatMap(h => offsetPolyline(h, -R)).filter(r => r?.length >= 3);
  if (!eh.length) return vo;
  const res = [];
  for (const oc of vo) {
    for (const p of differenceOuterOnly(oc, eh)) if (p?.length >= 3) res.push(p);
  }
  return res;
}

function extractSpine(outer, holes, tanAngle, stepR, maxDepth) {
  const maxSteps = Math.ceil(maxDepth / stepR);
  const COLLAPSE_SQ = (3 * stepR) ** 2;
  const spine = [];

  let prevVerts = [];
  let prevR = 0;

  for (let i = 1; i <= maxSteps; i++) {
    const R = i * stepR;
    const paths = computeValidPaths(outer, holes, R);

    if (!paths.length) {
      const z = -prevR / tanAngle;
      for (const v of prevVerts) spine.push({ x: v.x, y: v.y, z });
      break;
    }

    const currVerts = paths.flatMap(p => stripClose([...p]));

    if (prevVerts.length > 0) {
      const z = -prevR / tanAngle;
      for (const v of prevVerts) {
        let near = false;
        for (const c of currVerts) {
          if (dist2(v, c) < COLLAPSE_SQ) { near = true; break; }
        }
        if (!near) spine.push({ x: v.x, y: v.y, z });
      }
    }

    prevVerts = currVerts;
    prevR = R;
  }

  return spine;
}

function orderSpine(pts) {
  if (!pts.length) return [];
  let startIdx = 0;
  for (let i = 1; i < pts.length; i++) {
    if (pts[i].z < pts[startIdx].z) startIdx = i;
  }
  const rem = [...pts];
  const out = [];
  let cur = rem.splice(startIdx, 1)[0];
  out.push(cur);
  while (rem.length) {
    let bestD = Infinity, bestI = -1;
    for (let i = 0; i < rem.length; i++) {
      const d = dist2(rem[i], cur);
      if (d < bestD) { bestD = d; bestI = i; }
    }
    cur = rem.splice(bestI, 1)[0];
    out.push(cur);
  }
  return out;
}

function generateGCode(spinePoints, config) {
  const { safeZ=5, feedRate=1499, plungeRate=305, spindleRPM=18000, rapidGap=2 } = config;
  const fmt = v => v.toFixed(4);
  const rapidGapSq = rapidGap * rapidGap;
  const lines = [
    '; V-Carve — MassoCAM Medial-Spine Single Pass',
    'G21', 'G90', `S${spindleRPM} M03`, `G00 Z${fmt(safeZ)}`,
  ];
  if (spinePoints.length >= 2) {
    lines.push(`G00 X${fmt(spinePoints[0].x)} Y${fmt(spinePoints[0].y)}`);
    lines.push(`G01 Z${fmt(spinePoints[0].z)} F${plungeRate}`);
    for (let i = 1; i < spinePoints.length; i++) {
      const prev = spinePoints[i-1], curr = spinePoints[i];
      if (dist2(curr, prev) > rapidGapSq) {
        lines.push(`G00 Z${fmt(safeZ)}`);
        lines.push(`G00 X${fmt(curr.x)} Y${fmt(curr.y)}`);
        lines.push(`G01 Z${fmt(curr.z)} F${plungeRate}`);
      } else {
        lines.push(`G01 X${fmt(curr.x)} Y${fmt(curr.y)} Z${fmt(curr.z)} F${feedRate}`);
      }
    }
    lines.push(`G00 Z${fmt(safeZ)}`);
  }
  lines.push('M05', 'M30');
  return lines.join('\n');
}

function cornerBranches(outerPolygon, rawSpine, tanAngle, angleThreshold) {
  if (!rawSpine.length) return [];
  angleThreshold = angleThreshold !== undefined ? angleThreshold : Math.PI / 2;
  const n = outerPolygon.length;
  const SEARCH_SQ = 36, BRANCH_STEP = 0.05;
  const branches = [];
  for (let i = 0; i < n; i++) {
    const prev = outerPolygon[(i + n - 1) % n];
    const curr = outerPolygon[i];
    const next = outerPolygon[(i + 1) % n];
    const aLen = Math.hypot(prev.x - curr.x, prev.y - curr.y);
    const bLen = Math.hypot(next.x - curr.x, next.y - curr.y);
    if (aLen < 1e-9 || bLen < 1e-9) continue;
    const adx = (prev.x - curr.x) / aLen, ady = (prev.y - curr.y) / aLen;
    const bdx = (next.x - curr.x) / bLen, bdy = (next.y - curr.y) / bLen;
    const cross = adx * bdy - ady * bdx;
    if (cross >= 0) continue;
    const dot = adx * bdx + ady * bdy;
    const angle = Math.atan2(-cross, dot);
    if (angle > angleThreshold) continue;
    const bisRawX = adx + bdx, bisRawY = ady + bdy;
    const bisLen = Math.hypot(bisRawX, bisRawY);
    if (bisLen < 1e-9) continue;
    const bx = bisRawX / bisLen, by = bisRawY / bisLen;
    const sinHalf = Math.sin(angle / 2);
    const PERP_MAX = 2.0;
    let bestPerp = Infinity, targetZ = 0;
    for (const sv of rawSpine) {
      const dx = sv.x - curr.x, dy = sv.y - curr.y;
      if (dx * dx + dy * dy > SEARCH_SQ) continue;
      const proj = dx * bx + dy * by;
      if (proj < 0.05) continue;
      const perp = Math.abs(dx * by - dy * bx);
      if (perp < bestPerp) { bestPerp = perp; targetZ = sv.z; }
    }
    if (bestPerp > PERP_MAX || targetZ >= 0) continue;
    const hitT = (-targetZ * tanAngle) / sinHalf;
    if (hitT < 0.1) continue;
    const steps = Math.max(5, Math.ceil(hitT / BRANCH_STEP));
    for (let s = 0; s <= steps; s++) {
      const t = (s / steps) * hitT;
      branches.push({ x: curr.x + t * bx, y: curr.y + t * by, z: -(t * sinHalf) / tanAngle });
    }
    // Vertical extension: stem tip → nearest rawSpine vertex above (same x-side)
    const tipX = curr.x + hitT * bx, tipY = curr.y + hitT * by;
    let topSv = null, topDist = Infinity;
    for (const sv of rawSpine) {
      if (Math.abs(sv.x - tipX) > 1.0 || sv.y <= tipY + 0.05) continue;
      const d = sv.y - tipY;
      if (d < topDist && d < 5.0) { topDist = d; topSv = sv; }
    }
    if (topSv) {
      const extSteps = Math.max(2, Math.ceil(topDist / BRANCH_STEP));
      for (let s = 1; s <= extSteps; s++) {
        const f = s / extSteps;
        branches.push({ x: tipX + f*(topSv.x-tipX), y: tipY + f*(topSv.y-tipY), z: targetZ });
      }
    }
  }
  return branches;
}

function computeVCarveToolpath(outer, holes, config) {
  const {
    depthStep=0.05, maxDepth=25, bitHalfAngleDeg=45,
    safeZ=5, feedRate=1499, plungeRate=305, spindleRPM=18000,
  } = config;

  const tanAngle = Math.tan(bitHalfAngleDeg * Math.PI / 180);
  const outerN = isClockwise(outer) ? [...outer].reverse() : outer;
  const holesN = (holes || []).map(h => isClockwise(h) ? [...h].reverse() : h);

  const rawSpine = extractSpine(outerN, holesN, tanAngle, depthStep, maxDepth);
  const branches = cornerBranches(outerN, rawSpine, tanAngle);
  const spineVertices = orderSpine([...rawSpine, ...branches]);
  const gcode = generateGCode(spineVertices, { safeZ, feedRate, plungeRate, spindleRPM });
  return { spineVertices, gcode };
}

// ── Shape definitions ─────────────────────────────────────────────────────────

function makeNgon(cx, cy, r, n, a0 = 0) {
  return Array.from({ length: n }, (_, i) => {
    const a = a0 + 2 * Math.PI * i / n;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  });
}

const SHAPES = {
  synthetic: {
    label: "Synthetic 'a' (control shape)",
    outer: [
      {x:-1.5,y:-7},{x:1.5,y:-7},{x:1.5,y:-4.5},
      {x:4.0,y:-4.0},{x:5.5,y:-2.0},{x:6.0,y:0.0},
      {x:5.5,y:2.0},{x:4.0,y:4.0},{x:2.0,y:5.5},
      {x:0.0,y:6.0},{x:-2.0,y:5.5},{x:-4.0,y:4.0},
      {x:-5.5,y:2.0},{x:-6.0,y:0.0},{x:-5.5,y:-2.0},
      {x:-4.0,y:-4.0},{x:-2.0,y:-5.0},{x:-1.5,y:-4.5},
    ],
    holes: [makeNgon(0, 1, 2.5, 32)],
  },
  realistic: {
    label: "Realistic 'a' (production shape — irregular counter)",
    outer: [
      {x:0.0,y:-8.0},{x:2.0,y:-8.0},{x:2.0,y:-5.5},
      {x:5.0,y:-5.0},{x:7.5,y:-2.5},{x:8.0,y:0.0},
      {x:7.5,y:3.0},{x:5.5,y:5.5},{x:3.0,y:7.0},
      {x:0.5,y:7.5},{x:-2.5,y:7.0},{x:-5.0,y:5.0},
      {x:-7.0,y:2.0},{x:-7.5,y:-1.0},{x:-6.5,y:-4.0},
      {x:-4.0,y:-6.0},{x:-1.5,y:-6.5},{x:0.0,y:-5.5},
    ],
    holes: [[
      {x:0.0,y:4.5},{x:-2.0,y:4.0},{x:-3.5,y:2.5},
      {x:-4.0,y:0.5},{x:-3.5,y:-1.5},{x:-2.0,y:-2.8},
      {x:0.0,y:-3.2},{x:2.0,y:-2.8},{x:3.5,y:-1.0},
      {x:4.0,y:1.0},{x:3.2,y:3.0},{x:1.5,y:4.2},
    ]],
  },
};

// ── Canvas rendering ──────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let lastRender = null;

// Depth fraction t∈[0,1] (0=shallow, 1=deep) → CSS colour.
function depthColor(t) {
  return `hsl(${Math.round(60 + t * 180)},100%,55%)`;
}

function drawLegendBar() {
  const lc = document.getElementById('legendBar');
  lc.width = lc.offsetWidth || 200;
  lc.height = 12;
  const lctx = lc.getContext('2d');
  const grad = lctx.createLinearGradient(0, 0, lc.width, 0);
  grad.addColorStop(0,   depthColor(0));
  grad.addColorStop(0.5, depthColor(0.5));
  grad.addColorStop(1,   depthColor(1));
  lctx.fillStyle = grad;
  lctx.fillRect(0, 0, lc.width, lc.height);
}

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  if (lastRender) renderAll(lastRender);
}

function makeBounds(shape, spineVertices) {
  let mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
  const add = (x, y) => {
    if (x < mnX) mnX = x; if (x > mxX) mxX = x;
    if (y < mnY) mnY = y; if (y > mxY) mxY = y;
  };
  for (const p of shape.outer) add(p.x, p.y);
  for (const h of shape.holes) for (const p of h) add(p.x, p.y);
  for (const p of spineVertices) add(p.x, p.y);
  return { mnX, mxX, mnY, mxY };
}

function makeTransform(bounds, margin = 44) {
  const W = canvas.width - 2*margin, H = canvas.height - 2*margin;
  const sx = W / (bounds.mxX - bounds.mnX || 1);
  const sy = H / (bounds.mxY - bounds.mnY || 1);
  const scale = Math.min(sx, sy);
  const ox = (canvas.width  - scale*(bounds.mxX - bounds.mnX)) / 2;
  const oy = (canvas.height - scale*(bounds.mxY - bounds.mnY)) / 2;
  return {
    x: p => ox + (p.x - bounds.mnX) * scale,
    y: p => canvas.height - (oy + (p.y - bounds.mnY) * scale),
    scale,
  };
}

function drawPoly(poly, T, stroke, fill, lw = 1.5) {
  if (!poly || poly.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(T.x(poly[0]), T.y(poly[0]));
  for (let i = 1; i < poly.length; i++) ctx.lineTo(T.x(poly[i]), T.y(poly[i]));
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill;     ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
}

function renderAll({ shape, spineVertices }) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#141414';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const bounds = makeBounds(shape, spineVertices);
  const T = makeTransform(bounds);

  // Shape outline and holes (faint reference)
  drawPoly(shape.outer, T, 'rgba(255,255,255,0.25)', 'rgba(255,255,255,0.03)', 1.5);
  for (const h of shape.holes)
    drawPoly(h, T, 'rgba(180,180,180,0.25)', 'rgba(0,0,0,0.2)', 1);

  if (!spineVertices.length) return;

  const zMin = Math.min(...spineVertices.map(p => p.z));
  const zMax = Math.max(...spineVertices.map(p => p.z));
  const zRange = zMax - zMin || 1;

  // Identify rapid gaps (> 2 mm) — don't draw those segments
  const RAPID_GAP_SQ = 4; // 2mm²

  // Draw spine path, segment by segment, coloured by midpoint Z depth
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  for (let i = 1; i < spineVertices.length; i++) {
    const p1 = spineVertices[i - 1];
    const p2 = spineVertices[i];
    if (dist2(p1, p2) > RAPID_GAP_SQ) continue; // skip rapid
    const t = ((p1.z + p2.z) / 2 - zMax) / (zMin - zMax); // 0=shallow,1=deep
    ctx.strokeStyle = depthColor(Math.max(0, Math.min(1, t)));
    ctx.beginPath();
    ctx.moveTo(T.x(p1), T.y(p1));
    ctx.lineTo(T.x(p2), T.y(p2));
    ctx.stroke();
  }

  // Draw spine vertices as small dots
  for (const p of spineVertices) {
    const t = (p.z - zMax) / (zMin - zMax);
    ctx.fillStyle = depthColor(Math.max(0, Math.min(1, t)));
    ctx.beginPath();
    ctx.arc(T.x(p), T.y(p), 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Info overlay
  ctx.font = '10px Consolas, monospace';
  ctx.fillStyle = '#555';
  ctx.fillText(
    `Z: ${zMin.toFixed(2)} → ${zMax.toFixed(2)} mm   spine pts: ${spineVertices.length}`,
    8, 14
  );
}

// ── Run pipeline ──────────────────────────────────────────────────────────────

function getConfig() {
  return {
    depthStep:       +document.getElementById('depthStep').value,
    bitHalfAngleDeg: +document.getElementById('bitAngle').value,
    maxDepth:        25.0,
    safeZ:           +document.getElementById('safeZ').value,
    feedRate:        +document.getElementById('feedRate').value,
    plungeRate:      +document.getElementById('plungeRate').value,
    spindleRPM:      +document.getElementById('spindleRPM').value,
  };
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

document.getElementById('runBtn').addEventListener('click', () => {
  const shapeKey = document.getElementById('shapeSelect').value;
  const shape = SHAPES[shapeKey];
  const cfg = getConfig();

  setStatus('Running…');
  document.getElementById('gcode').value = '';

  setTimeout(() => {
    const t0 = performance.now();
    let result;
    try {
      result = computeVCarveToolpath(shape.outer, shape.holes, cfg);
    } catch (e) {
      setStatus('ERROR: ' + e.message);
      console.error(e);
      return;
    }
    const ms = (performance.now() - t0).toFixed(0);

    const { spineVertices, gcode } = result;
    const zMin = spineVertices.length ? Math.min(...spineVertices.map(p => p.z)) : 0;
    const zMax = spineVertices.length ? Math.max(...spineVertices.map(p => p.z)) : 0;

    // Path length (sum of non-rapid segments)
    let pathLen = 0;
    const RAPID_GAP_SQ = 4;
    for (let i = 1; i < spineVertices.length; i++) {
      const d = dist2(spineVertices[i], spineVertices[i-1]);
      if (d <= RAPID_GAP_SQ) pathLen += Math.sqrt(d);
    }

    setStatus(
      `${shape.label}\n` +
      `Step: ${cfg.depthStep}mm  Angle: ${cfg.bitHalfAngleDeg}°\n` +
      `Spine pts: ${spineVertices.length}\n` +
      `Z range: ${zMin.toFixed(3)} → ${zMax.toFixed(3)} mm\n` +
      `Path len: ${pathLen.toFixed(1)} mm\n` +
      `Time: ${ms}ms`
    );

    document.getElementById('gcode').value = gcode;
    lastRender = { shape, spineVertices };
    resizeCanvas();
  }, 10);
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const ta = document.getElementById('gcode');
  if (!ta.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
});

window.addEventListener('resize', resizeCanvas);
drawLegendBar();
resizeCanvas();
document.getElementById('runBtn').click();
</script>
</body>
</html>
