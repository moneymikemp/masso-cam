<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MassoCAM — V-Carve Phase 2 Harness</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #111; color: #ccc; font: 13px/1.4 'Consolas','Courier New',monospace; }

#app { display: flex; height: 100vh; overflow: hidden; }

#controls {
  width: 240px; min-width: 240px; background: #1a1a1a;
  border-right: 1px solid #333; padding: 10px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 6px;
}

#controls h2 { color: #fff; font-size: 13px; margin-bottom: 4px; letter-spacing: 0.5px; }

.field { display: flex; flex-direction: column; gap: 2px; }
.field label { color: #888; font-size: 11px; }
.field input, .field select {
  background: #222; border: 1px solid #444; color: #eee;
  padding: 4px 6px; border-radius: 3px; font: inherit; width: 100%;
}
.field input:focus, .field select:focus { outline: none; border-color: #0af; }

hr { border: none; border-top: 1px solid #2a2a2a; margin: 2px 0; }

#runBtn {
  margin-top: 4px; padding: 7px; background: #005a9e;
  border: none; border-radius: 3px; color: #fff; font: inherit;
  cursor: pointer; letter-spacing: 0.5px; font-size: 13px;
}
#runBtn:hover { background: #0074cc; }
#runBtn:active { background: #004a80; }

#status {
  font-size: 11px; color: #666; padding-top: 6px;
  border-top: 1px solid #2a2a2a; white-space: pre-wrap; line-height: 1.6;
}

#legend { font-size: 11px; line-height: 1.8; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

#canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #1a1a1a; }
#canvas { display: block; }

#gcode-panel {
  width: 300px; min-width: 300px; background: #1a1a1a;
  border-left: 1px solid #333; display: flex; flex-direction: column;
}
#gcode-header {
  padding: 8px 10px; background: #222; border-bottom: 1px solid #333;
  display: flex; justify-content: space-between; align-items: center;
}
#gcode-header span { color: #fff; font-size: 12px; }
#copyBtn {
  padding: 3px 8px; background: #333; border: 1px solid #555;
  border-radius: 3px; color: #ccc; font: 11px/1 inherit; cursor: pointer;
}
#copyBtn:hover { background: #444; }
#gcode {
  flex: 1; background: #0e0e0e; color: #4cf; font: 11px/1.5 'Consolas','Courier New',monospace;
  border: none; resize: none; padding: 8px; overflow-y: auto;
  white-space: pre; outline: none;
}
</style>
</head>
<body>

<script src="../../../node_modules/clipper-lib/clipper.js"></script>

<div id="app">
  <!-- ── Controls ───────────────────────────────────────────── -->
  <div id="controls">
    <h2>V-Carve Phase 2 Harness</h2>

    <div class="field">
      <label>Shape</label>
      <select id="shapeSelect">
        <option value="synthetic">Synthetic 'a' (control)</option>
        <option value="realistic">Realistic 'a' (production)</option>
      </select>
    </div>

    <hr>
    <div class="field">
      <label>Step size (mm)</label>
      <input id="stepSize" type="number" value="0.10" step="0.01" min="0.01" max="0.5">
    </div>
    <div class="field">
      <label>Bit half-angle (°)</label>
      <input id="bitAngle" type="number" value="45" step="1" min="10" max="80">
    </div>
    <div class="field">
      <label>Safe Z (mm)</label>
      <input id="safeZ" type="number" value="5.0" step="0.5" min="0.5" max="25">
    </div>

    <hr>
    <div class="field">
      <label>Spindle (RPM)</label>
      <input id="spindleRPM" type="number" value="18000" step="1000" min="1000" max="30000">
    </div>
    <div class="field">
      <label>Cut feed (mm/min)</label>
      <input id="feedRate" type="number" value="1498.6" step="10" min="50" max="6000">
    </div>
    <div class="field">
      <label>Plunge feed (mm/min)</label>
      <input id="plungeRate" type="number" value="304.8" step="5" min="10" max="2000">
    </div>

    <button id="runBtn">&#9654; Run</button>

    <div id="legend">
      <span class="dot" style="background:#ff4444"></span>Terminal<br>
      <span class="dot" style="background:#4488ff"></span>Junction<br>
      <span class="dot" style="background:#44cc44"></span>Annular ring<br>
      <span class="dot" style="background:#00ccff;border-radius:0;width:14px;height:3px;"></span>Toolpath<br>
    </div>

    <div id="status">Ready.</div>
  </div>

  <!-- ── Canvas ─────────────────────────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <!-- ── G-code output ──────────────────────────────────────── -->
  <div id="gcode-panel">
    <div id="gcode-header">
      <span>G-Code Output</span>
      <button id="copyBtn">Copy</button>
    </div>
    <textarea id="gcode" readonly spellcheck="false"></textarea>
  </div>
</div>

<script>
'use strict';

// ── Clipper geometry helpers ──────────────────────────────────────────────────

const SCALE = 1000;
function toC(pts) { return pts.map(p => ({ X: Math.round(p.x * SCALE), Y: Math.round(p.y * SCALE) })); }
function fromC(path) { return path.map(p => ({ x: p.X / SCALE, y: p.Y / SCALE })); }

function stripClose(pts) {
  if (pts.length > 1 && Math.hypot(pts[pts.length-1].x - pts[0].x, pts[pts.length-1].y - pts[0].y) < 1e-6)
    return pts.slice(0, -1);
  return pts;
}

function isClockwise(pts) {
  let sum = 0;
  const n = pts.length;
  for (let i = 0; i < n - 1; i++)
    sum += (pts[i+1].x - pts[i].x) * (pts[i+1].y + pts[i].y);
  return sum > 0;
}

function polygonArea(pts) {
  let a = 0, n = pts.length;
  for (let i = 0, j = n - 1; i < n; j = i++) a += (pts[j].x + pts[i].x) * (pts[j].y - pts[i].y);
  return Math.abs(a / 2);
}

function clipperOffset(pts, distance) {
  const co = new ClipperLib.ClipperOffset();
  co.AddPath(toC(pts), ClipperLib.JoinType.jtMiter, ClipperLib.EndType.etClosedPolygon);
  const sol = new ClipperLib.Paths();
  co.Execute(sol, -distance * SCALE);
  return sol.map(fromC).filter(p => p.length >= 3)
    .map(p => isClockwise(p) ? [...p].reverse() : p)
    .sort((a, b) => polygonArea(b) - polygonArea(a));
}

function offsetPolyline(pts, d, closed = true) {
  const p = stripClose([...pts]);
  if (p.length < 3) return [p];
  const r = clipperOffset(p, d);
  if (!r.length) return [[]];
  return r.map(q => [...q, { ...q[0] }]);
}

function differencePolygons(subj, clipList) {
  const s = stripClose([...subj]);
  if (s.length < 3) return [];
  const c = new ClipperLib.Clipper();
  c.AddPath(toC(s), ClipperLib.PolyType.ptSubject, true);
  for (const cl of clipList) {
    const p = stripClose([...cl]);
    if (p.length >= 3) c.AddPath(toC(p), ClipperLib.PolyType.ptClip, true);
  }
  const sol = new ClipperLib.Paths();
  c.Execute(ClipperLib.ClipType.ctDifference, sol);
  return sol.map(fromC).filter(p => p.length >= 3).map(p => isClockwise(p) ? [...p].reverse() : p);
}

// ── Internal helpers ──────────────────────────────────────────────────────────

function vertexCenter(pts) {
  let sx = 0, sy = 0;
  for (const p of pts) { sx += p.x; sy += p.y; }
  return { x: sx / pts.length, y: sy / pts.length };
}
function bboxCenter(pts) {
  let mnX = pts[0].x, mxX = pts[0].x, mnY = pts[0].y, mxY = pts[0].y;
  for (const p of pts) {
    if (p.x < mnX) mnX = p.x; if (p.x > mxX) mxX = p.x;
    if (p.y < mnY) mnY = p.y; if (p.y > mxY) mxY = p.y;
  }
  return { x: (mnX + mxX) / 2, y: (mnY + mxY) / 2 };
}
function dist2(a, b) { return (a.x - b.x) ** 2 + (a.y - b.y) ** 2; }
function dist3(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2); }

// Fix 1 helpers: continuous Z from actual wall distance.
function ptSegDist(p, a, b) {
  const dx = b.x-a.x, dy = b.y-a.y, len2 = dx*dx+dy*dy;
  if (len2 === 0) return Math.hypot(p.x-a.x, p.y-a.y);
  const t = Math.max(0, Math.min(1, ((p.x-a.x)*dx+(p.y-a.y)*dy)/len2));
  return Math.hypot(p.x-(a.x+t*dx), p.y-(a.y+t*dy));
}
function wallDist(p, outer, holes) {
  let minD = Infinity;
  for (let i = 0; i < outer.length; i++) {
    const d = ptSegDist(p, outer[i], outer[(i+1) % outer.length]);
    if (d < minD) minD = d;
  }
  for (const h of holes) {
    for (let i = 0; i < h.length; i++) {
      const d = ptSegDist(p, h[i], h[(i+1) % h.length]);
      if (d < minD) minD = d;
    }
  }
  return minD;
}

function computeValidPaths(outer, holes, d) {
  const so = offsetPolyline(outer, d, true);
  if (!so?.length) return [];
  const vo = so.filter(r => r?.length >= 3);
  if (!vo.length) return [];
  if (!holes?.length) return vo;
  const eh = holes.flatMap(h => offsetPolyline(h, -d, true)).filter(r => r?.length >= 3);
  if (!eh.length) return vo;
  const res = [];
  for (const oc of vo) for (const p of differencePolygons(oc, eh)) if (p?.length >= 3) res.push(p);
  return res;
}

function greedyMatch(prevCenters, curCenters) {
  const claimed = new Set();
  const prevMatch = new Array(prevCenters.length).fill(-1);
  for (let pi = 0; pi < prevCenters.length; pi++) {
    let best = -1, bd = Infinity;
    for (let ci = 0; ci < curCenters.length; ci++) {
      if (claimed.has(ci)) continue;
      const d = dist2(prevCenters[pi], curCenters[ci]);
      if (d < bd) { bd = d; best = ci; }
    }
    prevMatch[pi] = best;
    if (best >= 0) claimed.add(best);
  }
  const orphanCurs = [];
  for (let ci = 0; ci < curCenters.length; ci++) if (!claimed.has(ci)) orphanCurs.push(ci);
  return { prevMatch, orphanCurs };
}

function sharpCorners(poly, maxDeg) {
  const pts = stripClose(poly);
  const n = pts.length;
  const thr = Math.cos(maxDeg * Math.PI / 180);
  const out = [];
  for (let i = 0; i < n; i++) {
    const prev = pts[(i - 1 + n) % n], cur = pts[i], next = pts[(i + 1) % n];
    const ax = prev.x - cur.x, ay = prev.y - cur.y;
    const bx = next.x - cur.x, by = next.y - cur.y;
    const la = Math.hypot(ax, ay), lb = Math.hypot(bx, by);
    if (la < 1e-6 || lb < 1e-6) continue;
    if ((ax * bx + ay * by) / (la * lb) >= thr) out.push({ x: cur.x, y: cur.y });
  }
  return out;
}

// ── erodeWithHistory ──────────────────────────────────────────────────────────

function erodeWithHistory(outer, holes, config) {
  const { stepSize, bitHalfAngleDeg, maxSteps } = config;
  const tanAngle = Math.tan(bitHalfAngleDeg * Math.PI / 180);
  const rawNodes = [];
  const rings = [];
  let ringCounter = 0;

  function pushNode(x, y, d, type, extra) {
    rawNodes.push(Object.assign({ x, y, z: -(d / tanAngle), eventType: type, stepD: d, source: 'event' }, extra));
  }
  function emitAnnularRing(poly, d) {
    const pts = stripClose([...poly]);
    const rid = ringCounter++;
    for (let vi = 0; vi < pts.length; vi++) {
      rawNodes.push({ x: pts[vi].x, y: pts[vi].y, z: -(d / tanAngle),
        eventType: 'terminal', source: 'annular', stepD: d,
        ringId: rid, ringIdx: vi, ringLen: pts.length });
    }
  }
  function mineRidgePoints(startRingIdx) {
    for (let ri = startRingIdx; ri < rings.length; ri++) {
      const { d, paths } = rings[ri];
      const mainPath = paths.reduce((best, p) => polygonArea(p) > polygonArea(best) ? p : best, paths[0]);
      for (const c of sharpCorners(mainPath, 120))
        rawNodes.push({ x: c.x, y: c.y, z: -(d / tanAngle), eventType: 'terminal', source: 'event', stepD: d });
    }
  }

  // Fix 3: emit only the largest-area path as the annular ring skeleton;
  // inner hole boundaries (reversed to CCW by differencePolygons) emit a single
  // centroid terminal so they don't produce a second parallel ring track.
  function emitCollapse(paths, d) {
    const sorted = [...paths].sort((a, b) => polygonArea(b) - polygonArea(a));
    const thresh = stepSize * stepSize * 50;
    for (let pi = 0; pi < sorted.length; pi++) {
      const p = sorted[pi];
      if (pi === 0 && polygonArea(p) > thresh) {
        emitAnnularRing(p, d);
        mineRidgePoints(Math.floor(rings.length * 0.5));
      } else {
        const c = vertexCenter(p);
        pushNode(c.x, c.y, d, 'terminal');
      }
    }
  }

  let prevPaths = computeValidPaths(outer, holes, stepSize);
  if (!prevPaths.length) return { rawNodes, rings };
  rings.push({ d: stepSize, paths: prevPaths });

  for (let i = 2; i <= maxSteps; i++) {
    const curD = i * stepSize, prevD = (i - 1) * stepSize;
    const curPaths = computeValidPaths(outer, holes, curD);

    if (curPaths.length === 0) {
      emitCollapse(prevPaths, prevD);
      prevPaths = [];
      break;
    }

    const prevCenters = prevPaths.map(bboxCenter);
    const curCenters  = curPaths.map(bboxCenter);

    if (curPaths.length !== prevPaths.length) {
      const { prevMatch, orphanCurs } = greedyMatch(prevCenters, curCenters);
      const terminated = prevPaths.filter((_, pi) => prevMatch[pi] < 0);
      if (terminated.length > 0) emitCollapse(terminated, prevD);
      for (const ci of orphanCurs) {
        let bestPi = 0, bd = dist2(curCenters[ci], prevCenters[0]);
        for (let pi = 1; pi < prevCenters.length; pi++) {
          const d = dist2(curCenters[ci], prevCenters[pi]);
          if (d < bd) { bd = d; bestPi = pi; }
        }
        const c = vertexCenter(prevPaths[bestPi]);
        pushNode(c.x, c.y, prevD, 'junction');
      }
    } else {
      const jumpThresh = (20 * stepSize) ** 2;
      for (let pi = 0; pi < prevPaths.length; pi++) {
        let bd2 = dist2(prevCenters[pi], curCenters[0]);
        for (let ci = 1; ci < curCenters.length; ci++) {
          const d2 = dist2(prevCenters[pi], curCenters[ci]);
          if (d2 < bd2) bd2 = d2;
        }
        if (bd2 > jumpThresh) {
          const c = vertexCenter(prevPaths[pi]);
          pushNode(c.x, c.y, prevD, 'junction');
        }
      }
    }

    rings.push({ d: curD, paths: curPaths });
    prevPaths = curPaths;
  }

  for (const p of prevPaths) {
    const c = vertexCenter(p);
    pushNode(c.x, c.y, maxSteps * stepSize, 'terminal');
  }
  return { rawNodes, rings };
}

// ── deduplicateNodes ──────────────────────────────────────────────────────────

function deduplicateNodes(rawNodes, stepSize) {
  const rSq = (1.5 * stepSize) ** 2;
  const out = [], used = new Set();
  for (let i = 0; i < rawNodes.length; i++) {
    if (used.has(i)) continue;
    if (rawNodes[i].source !== 'event') { out.push(Object.assign({}, rawNodes[i])); continue; }
    const group = [rawNodes[i]]; used.add(i);
    for (let j = i + 1; j < rawNodes.length; j++) {
      if (used.has(j) || rawNodes[j].source !== 'event') continue;
      if (dist2(rawNodes[i], rawNodes[j]) <= rSq) { group.push(rawNodes[j]); used.add(j); }
    }
    const avgX = group.reduce((s, n) => s + n.x, 0) / group.length;
    const avgY = group.reduce((s, n) => s + n.y, 0) / group.length;
    const minZ = Math.min(...group.map(n => n.z));
    const type = group.some(n => n.eventType === 'junction') ? 'junction' : 'terminal';
    out.push({ x: avgX, y: avgY, z: minZ, eventType: type, source: 'event', stepD: group[0].stepD });
  }
  return out;
}

// ── buildGraph ────────────────────────────────────────────────────────────────

function buildGraph(nodes, stepSize) {
  const n = nodes.length;
  for (let i = 0; i < n; i++) nodes[i].id = i;
  const adj = Array.from({ length: n }, () => []);

  function addEdge(a, b) {
    if (a === b) return;
    if (adj[a].some(e => e.toId === b)) return;
    const d = dist3(nodes[a], nodes[b]);
    adj[a].push({ toId: b, dist: d });
    adj[b].push({ toId: a, dist: d });
  }

  const thr2d = (2.0 * stepSize) ** 2;
  for (let i = 0; i < n; i++)
    for (let j = i + 1; j < n; j++) {
      const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
      if (dx * dx + dy * dy <= thr2d) addEdge(i, j);
    }

  const ringGroups = new Map();
  for (let i = 0; i < n; i++) {
    if (nodes[i].source !== 'annular') continue;
    const rg = ringGroups.get(nodes[i].ringId) || [];
    rg.push(i); ringGroups.set(nodes[i].ringId, rg);
  }
  for (const [, rg] of ringGroups) {
    rg.sort((a, b) => nodes[a].ringIdx - nodes[b].ringIdx);
    for (let k = 0; k < rg.length; k++) addEdge(rg[k], rg[(k + 1) % rg.length]);
    let bestRi = rg[0], bestSk = -1, bestD = Infinity;
    for (const ri of rg) {
      for (let j = 0; j < n; j++) {
        if (nodes[j].source === 'annular' && nodes[j].ringId === nodes[ri].ringId) continue;
        const d = dist2(nodes[ri], nodes[j]);
        if (d < bestD) { bestD = d; bestRi = ri; bestSk = j; }
      }
    }
    if (bestSk >= 0) addEdge(bestRi, bestSk);
  }

  // Fix 2: MST bridge — isolated nodes (adj=[]) each get their own component
  // so they are never skipped and always bridged to their nearest neighbour.
  function getComps() {
    const c = new Array(n).fill(-1); let cc = 0;
    for (let s = 0; s < n; s++) {
      if (c[s] >= 0) continue;
      if (!adj[s].length) { c[s] = cc++; continue; } // isolated → own component
      const q = [s]; c[s] = cc;
      for (let qi = 0; qi < q.length; qi++)
        for (const e of adj[q[qi]]) if (c[e.toId] < 0) { c[e.toId] = cc; q.push(e.toId); }
      cc++;
    }
    return { c, cc };
  }
  let { c: comp, cc: compCount } = getComps();
  while (compCount > 1) {
    let ba = -1, bb = -1, bd = Infinity;
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        if (comp[i] === comp[j]) continue;
        const dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y, d = dx*dx+dy*dy;
        if (d < bd) { bd = d; ba = i; bb = j; }
      }
    }
    if (ba < 0) break;
    addEdge(ba, bb);
    ({ c: comp, cc: compCount } = getComps());
  }

  return { nodes, adj };
}

// ── traverseGraph ─────────────────────────────────────────────────────────────

function dfsComponent(nodes, adj, startId, stepSize) {
  const visited = new Set([startId]);
  const path = [nodes[startId]];
  const stack = [{ id: startId, prevZ: nodes[startId].z }];

  while (stack.length > 0) {
    const { id: v, prevZ } = stack[stack.length - 1];
    const curZ = nodes[v].z, dz = curZ - prevZ;
    const stackLen = stack.length;
    const prevId = stackLen >= 2 ? stack[stackLen - 2].id : -1;
    const dirX = prevId >= 0 ? nodes[v].x - nodes[prevId].x : 0;
    const dirY = prevId >= 0 ? nodes[v].y - nodes[prevId].y : 0;
    const dirLen = Math.hypot(dirX, dirY);
    let chosen = null, bestScore = Infinity;
    for (const e of adj[v]) {
      if (visited.has(e.toId)) continue;
      const zScore = Math.abs(nodes[e.toId].z - curZ - dz);
      let dirPenalty = 0;
      if (dirLen > 1e-6) {
        const toX = nodes[e.toId].x - nodes[v].x, toY = nodes[e.toId].y - nodes[v].y;
        const toLen = Math.hypot(toX, toY);
        if (toLen > 1e-6) {
          const dot = (dirX * toX + dirY * toY) / (dirLen * toLen);
          dirPenalty = (1 - dot) * stepSize;
        }
      }
      const score = zScore + dirPenalty;
      if (score < bestScore) { bestScore = score; chosen = e; }
    }
    if (chosen) {
      visited.add(chosen.toId);
      path.push(nodes[chosen.toId]);
      stack.push({ id: chosen.toId, prevZ: curZ });
    } else {
      stack.pop();
      if (stack.length > 0) path.push(nodes[stack[stack.length - 1].id]);
    }
  }
  return path;
}

function traverseGraph(nodes, adj, stepSize = 0.05) {
  if (!nodes.length) return [];
  const n = nodes.length;
  const comp = new Array(n).fill(-1); let compCount = 0;
  for (let s = 0; s < n; s++) {
    if (comp[s] >= 0) continue;
    if (!adj[s].length) { comp[s] = compCount++; continue; } // isolated → own comp
    const q = [s]; comp[s] = compCount;
    for (let qi = 0; qi < q.length; qi++)
      for (const e of adj[q[qi]]) if (comp[e.toId] < 0) { comp[e.toId] = compCount; q.push(e.toId); }
    compCount++;
  }
  const segments = [];
  for (let c = 0; c < compCount; c++) {
    const ids = [];
    for (let i = 0; i < n; i++) if (comp[i] === c) ids.push(i);
    if (ids.length < 2) continue;
    const terms = ids.filter(id => adj[id].length === 1);
    const cands = terms.length > 0 ? terms : ids;
    const startId = cands.reduce((best, id) =>
      (nodes[id].x**2 + nodes[id].y**2) < (nodes[best].x**2 + nodes[best].y**2) ? id : best, cands[0]);
    const seg = dfsComponent(nodes, adj, startId, stepSize);
    if (seg.length > 1) segments.push(seg);
  }
  return segments;
}

// ── generateGCode ─────────────────────────────────────────────────────────────

function generateGCode(segments, config) {
  const { safeZ=5, feedRate=1499, plungeRate=305, spindleRPM=18000 } = config;
  const f = v => v.toFixed(4);
  const lines = [
    '; V-Carve — MassoCAM Phase 2',
    'G21', 'G90',
    `S${spindleRPM} M03`,
    `G00 Z${f(safeZ)}`,
  ];
  for (const seg of segments) {
    if (seg.length < 2) continue;
    const s = seg[0];
    lines.push(`G00 X${f(s.x)} Y${f(s.y)}`);
    lines.push(`G01 Z${f(s.z)} F${plungeRate}`);
    for (let i = 1; i < seg.length; i++) {
      const p = seg[i];
      lines.push(`G01 X${f(p.x)} Y${f(p.y)} Z${f(p.z)} F${feedRate}`);
    }
    lines.push(`G00 Z${f(safeZ)}`);
  }
  lines.push('M05', 'M30');
  return lines.join('\n');
}

// ── Full pipeline ─────────────────────────────────────────────────────────────

function computeVCarveToolpath(outerPolygon, innerHoles, config) {
  const { stepSize=0.05, bitHalfAngleDeg=45, maxSteps=3000, safeZ=5,
          feedRate=1499, plungeRate=305, spindleRPM=18000 } = config;
  const tanAngle = Math.tan(bitHalfAngleDeg * Math.PI / 180);
  const outer = isClockwise(outerPolygon) ? [...outerPolygon].reverse() : outerPolygon;
  const holes = innerHoles.map(h => isClockwise(h) ? [...h].reverse() : h);
  const { rawNodes, rings } = erodeWithHistory(outer, holes, { stepSize, bitHalfAngleDeg, maxSteps });
  if (!rawNodes.length) return { rawNodes:[], rings:[], dedupNodes:[], graph:null, segments:[], gcode:'; No skeleton found\n' };
  const dedupNodes = deduplicateNodes(rawNodes, stepSize);
  const graph = buildGraph(dedupNodes, stepSize);
  const segments = traverseGraph(graph.nodes, graph.adj, stepSize);
  // Fix 1: recompute Z for every traversal point from the true wall distance at
  // that XY position — Z = -(wallDist / tan(bitHalfAngleDeg)).
  for (const seg of segments)
    for (const p of seg) { const wd = wallDist(p, outer, holes); p.z = -(Math.max(wd,0) / tanAngle); }
  const gcode = generateGCode(segments, { safeZ, feedRate, plungeRate, spindleRPM });
  return { rawNodes, rings, dedupNodes, graph, segments, gcode };
}

// ── Shape definitions ─────────────────────────────────────────────────────────

function makeNgon(cx, cy, r, n, a0=0) {
  return Array.from({length:n}, (_,i) => {
    const a = a0 + 2*Math.PI*i/n;
    return { x: cx + r*Math.cos(a), y: cy + r*Math.sin(a) };
  });
}

const SHAPES = {
  synthetic: {
    label: "Synthetic 'a' (control shape)",
    outer: [
      {x:-1.5,y:-7},{x:1.5,y:-7},{x:1.5,y:-4.5},
      {x:4.0,y:-4.0},{x:5.5,y:-2.0},{x:6.0,y:0.0},
      {x:5.5,y:2.0},{x:4.0,y:4.0},{x:2.0,y:5.5},
      {x:0.0,y:6.0},{x:-2.0,y:5.5},{x:-4.0,y:4.0},
      {x:-5.5,y:2.0},{x:-6.0,y:0.0},{x:-5.5,y:-2.0},
      {x:-4.0,y:-4.0},{x:-2.0,y:-5.0},{x:-1.5,y:-4.5},
    ],
    holes: [makeNgon(0, 1, 2.5, 32)],
  },
  realistic: {
    label: "Realistic 'a' (production shape — irregular counter)",
    outer: [
      // Slightly larger bowl, 14mm tall, non-symmetric
      {x:0.0,y:-8.0},{x:2.0,y:-8.0},{x:2.0,y:-5.5},
      {x:5.0,y:-5.0},{x:7.5,y:-2.5},{x:8.0,y:0.0},
      {x:7.5,y:3.0},{x:5.5,y:5.5},{x:3.0,y:7.0},
      {x:0.5,y:7.5},{x:-2.5,y:7.0},{x:-5.0,y:5.0},
      {x:-7.0,y:2.0},{x:-7.5,y:-1.0},{x:-6.5,y:-4.0},
      {x:-4.0,y:-6.0},{x:-1.5,y:-6.5},{x:0.0,y:-5.5},
    ],
    holes: [[
      // Egg-shaped counter (broader at top, not circular)
      {x:0.0,y:4.5},{x:-2.0,y:4.0},{x:-3.5,y:2.5},
      {x:-4.0,y:0.5},{x:-3.5,y:-1.5},{x:-2.0,y:-2.8},
      {x:0.0,y:-3.2},{x:2.0,y:-2.8},{x:3.5,y:-1.0},
      {x:4.0,y:1.0},{x:3.2,y:3.0},{x:1.5,y:4.2},
    ]],
  },
};

// ── Canvas rendering ──────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let lastResult = null;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  if (lastResult) renderAll(lastResult);
}

function makeBounds(shape, result) {
  let mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
  const add = (x, y) => { if(x<mnX)mnX=x; if(x>mxX)mxX=x; if(y<mnY)mnY=y; if(y>mxY)mxY=y; };
  for (const p of shape.outer) add(p.x, p.y);
  for (const h of shape.holes) for (const p of h) add(p.x, p.y);
  if (result) {
    for (const n of result.rawNodes) add(n.x, n.y);
    for (const seg of result.segments) for (const p of seg) add(p.x, p.y);
  }
  return { mnX, mxX, mnY, mxY };
}

function makeTransform(bounds, margin = 44) {
  const W = canvas.width - 2*margin, H = canvas.height - 2*margin;
  const sx = W / (bounds.mxX - bounds.mnX || 1);
  const sy = H / (bounds.mxY - bounds.mnY || 1);
  const scale = Math.min(sx, sy);
  const ox = (canvas.width  - scale*(bounds.mxX - bounds.mnX)) / 2;
  const oy = (canvas.height - scale*(bounds.mxY - bounds.mnY)) / 2;
  return {
    x: p => ox + (p.x - bounds.mnX) * scale,
    y: p => canvas.height - (oy + (p.y - bounds.mnY) * scale),  // flip Y
    scale,
  };
}

function drawPoly(poly, T, stroke, fill, lw=1.5) {
  if (!poly || poly.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(T.x(poly[0]), T.y(poly[0]));
  for (let i=1;i<poly.length;i++) ctx.lineTo(T.x(poly[i]), T.y(poly[i]));
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
}

function drawArrow(sx, sy, ex, ey, color) {
  const dx = ex-sx, dy = ey-sy, len = Math.hypot(dx, dy);
  if (len < 4) return;
  const ux = dx/len, uy = dy/len;
  const mx = (sx+ex)/2, my = (sy+ey)/2;
  const sz = Math.min(7, len*0.3);
  ctx.beginPath();
  ctx.fillStyle = color;
  ctx.moveTo(mx + ux*sz,          my + uy*sz);
  ctx.lineTo(mx - ux*sz + uy*sz*0.55, my - uy*sz - ux*sz*0.55);
  ctx.lineTo(mx - ux*sz - uy*sz*0.55, my - uy*sz + ux*sz*0.55);
  ctx.closePath(); ctx.fill();
}

function renderAll({ shape, result }) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#141414';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const bounds = makeBounds(shape, result);
  const T = makeTransform(bounds);

  // Shape outline
  drawPoly(shape.outer, T, 'rgba(255,255,255,0.7)', 'rgba(255,255,255,0.04)', 2);
  for (const h of shape.holes)
    drawPoly(h, T, 'rgba(180,180,180,0.5)', 'rgba(0,0,0,0.3)', 1.5);

  if (!result) return;

  // Toolpath segments
  for (const seg of result.segments) {
    if (seg.length < 2) continue;
    ctx.beginPath();
    ctx.strokeStyle = '#00ccff';
    ctx.lineWidth = 1.5;
    ctx.moveTo(T.x(seg[0]), T.y(seg[0]));
    for (let i = 1; i < seg.length; i++) ctx.lineTo(T.x(seg[i]), T.y(seg[i]));
    ctx.stroke();

    // Directional arrows
    const ARROW_SPACING = 40; // px
    let accum = 0;
    for (let i = 1; i < seg.length; i++) {
      const sx = T.x(seg[i-1]), sy = T.y(seg[i-1]);
      const ex = T.x(seg[i]),   ey = T.y(seg[i]);
      const d = Math.hypot(ex-sx, ey-sy);
      accum += d;
      if (accum >= ARROW_SPACING) {
        drawArrow(sx, sy, ex, ey, '#00eeff');
        accum = 0;
      }
    }
  }

  // Skeleton nodes
  for (const n of result.rawNodes) {
    const px = T.x(n), py = T.y(n);
    let color = '#ff4444';
    if (n.source === 'annular') color = '#44cc44';
    else if (n.eventType === 'junction') color = '#4488ff';
    ctx.beginPath();
    ctx.arc(px, py, n.source === 'annular' ? 2 : 3, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  // Toolpath start marker
  if (result.segments.length > 0 && result.segments[0].length > 0) {
    const s = result.segments[0][0];
    ctx.beginPath();
    ctx.arc(T.x(s), T.y(s), 5, 0, Math.PI*2);
    ctx.fillStyle = '#ffcc00';
    ctx.fill();
  }

  // Z-depth colour scale legend (top-right)
  if (result.rawNodes.length) {
    const zMin = Math.min(...result.rawNodes.map(n => n.z));
    ctx.font = '10px Consolas, monospace';
    ctx.fillStyle = '#555';
    ctx.fillText(`Z range: ${zMin.toFixed(2)} → 0.00 mm`, 8, 14);
  }
}

// ── Run pipeline ──────────────────────────────────────────────────────────────

function getConfig() {
  return {
    stepSize:      +document.getElementById('stepSize').value,
    bitHalfAngleDeg: +document.getElementById('bitAngle').value,
    maxSteps:      3000,
    safeZ:         +document.getElementById('safeZ').value,
    feedRate:      +document.getElementById('feedRate').value,
    plungeRate:    +document.getElementById('plungeRate').value,
    spindleRPM:    +document.getElementById('spindleRPM').value,
  };
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

document.getElementById('runBtn').addEventListener('click', () => {
  const shapeKey = document.getElementById('shapeSelect').value;
  const shape = SHAPES[shapeKey];
  const cfg = getConfig();

  setStatus('Running…');
  document.getElementById('gcode').value = '';

  // Defer so the UI updates before blocking computation
  setTimeout(() => {
    const t0 = performance.now();
    let result;
    try {
      result = computeVCarveToolpath(shape.outer, shape.holes, cfg);
    } catch (e) {
      setStatus('ERROR: ' + e.message);
      console.error(e);
      return;
    }
    const ms = (performance.now() - t0).toFixed(0);

    const raw = result.rawNodes.length;
    const dedup = result.dedupNodes.length;
    const segCount = result.segments.length;
    const ptCount  = result.segments.reduce((s, sg) => s + sg.length, 0);
    const eventTerminals = result.rawNodes.filter(n => n.eventType==='terminal' && n.source==='event').length;
    const annular        = result.rawNodes.filter(n => n.source==='annular').length;
    const junctions      = result.rawNodes.filter(n => n.eventType==='junction').length;

    setStatus(
      `${shape.label}\n` +
      `Step: ${cfg.stepSize}mm  Angle: ${cfg.bitHalfAngleDeg}°\n` +
      `Raw nodes: ${raw}  (terminal:${eventTerminals} junc:${junctions} annular:${annular})\n` +
      `Dedup nodes: ${dedup}\n` +
      `Segments: ${segCount}  (${ptCount} moves)\n` +
      `Time: ${ms}ms`
    );

    document.getElementById('gcode').value = result.gcode;

    lastResult = { shape, result };
    resizeCanvas();
  }, 10);
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const ta = document.getElementById('gcode');
  if (!ta.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
});

// Resize canvas on window resize
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Auto-run once on load
document.getElementById('runBtn').click();
</script>
