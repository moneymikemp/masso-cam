<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassoCAM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d1a; }
    ::-webkit-scrollbar-thumb { background: #2a2a50; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a70; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
    select option { background: #0d0d20; color: #ccccee; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
